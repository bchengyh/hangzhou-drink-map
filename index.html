<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>杭州瑞幸咖啡商业图谱</title><link rel="stylesheet" href="./static/styles.css"><link rel="stylesheet" href="./static/map-overrides.css?v=3"></head>
<body><header><div class="brandmark">L</div><div><h1>杭州连锁饮品商业图谱</h1><p>RETAIL INTELLIGENCE · AMAP · 8 DISTRICTS</p></div><div class="header-actions"><span id="syncState">正在连接高德数据源</span><button id="syncBtn">更新数据</button></div></header>
<main><aside class="left panel"><section><label>研究范围</label><div id="districtFilters" class="chips"></div></section><section><label>地图图层</label><div class="seg"><button data-layer="heat" class="active">门店热力</button><button data-layer="point">门店点位</button></div></section><section><label>研究品牌</label><div id="brandFilters" class="brand-list"></div></section><section class="note"><b>数据口径</b><p>统计高德地图八城区内可检索的瑞幸咖啡、蜜雪冰城与库迪咖啡 POI，以高德 POI ID 去重，坐标统一为 GCJ-02。</p></section></aside>
<section class="map-panel"><div class="map-head"><div><b>门店竞争密度</b><span id="selectionText">八区 · 品牌对比</span></div><div class="map-head-actions"><div class="legend brand-legend"><span class="luckin-scale"><i></i><i></i><i></i>瑞幸</span><span class="mixue-scale"><i></i><i></i><i></i>蜜雪</span><span class="cotti-scale"><i></i><i></i><i></i>库迪</span></div><button id="compareBtn">左右对比</button></div></div><div class="compare-label left-label">瑞幸咖啡</div><div class="compare-label right-label">蜜雪冰城</div><div id="amapBase"></div><div id="amapCompare"></div><svg id="map" viewBox="0 0 900 650"><defs><filter id="blur"><feGaussianBlur stdDeviation="4"/></filter></defs><g id="districts"></g><g id="heat"></g><g id="labels"></g><g id="points"></g></svg><div id="tooltip"></div>
<div class="calculator"><div class="calc-title"><span>参数计算尺</span><div class="seg small"><button data-mode="radius" class="active">热力半径</button><button data-mode="minimum">最低样本</button></div></div><div class="ruler"><span id="rangeMin">500m</span><input id="ruler" type="range" min="5" max="50" value="20"><span id="rangeMax">5km</span><strong id="rulerValue">2.0 km</strong></div><div class="calc-result"><span>当前样本 <b id="sampleCount">0</b></span><span>热点区域 <b id="hotspotCount">0</b></span><span>计算状态 <b>实时</b></span></div></div></section>
<aside class="right panel"><section class="metric-grid"><article><small>可检索门店</small><strong id="total">0</strong><em>当前筛选样本</em></article><article><small>识别品牌</small><strong id="brandTotal">0</strong><em>含独立门店</em></article><article><small>独立咖啡</small><strong id="independent">0</strong><em>未命中重点品牌</em></article><article><small>头部品牌</small><strong id="topBrand">—</strong><em id="topBrandMeta">0 家</em></article></section><section><div class="section-title"><b>区域竞争排行</b><span>门店数</span></div><div id="districtRank" class="rank"></div></section><section><div class="section-title"><b>品牌格局</b><span>TOP 6</span></div><div id="brandRank" class="rank"></div></section><section class="insight"><small>研究提示</small><p id="insight">完成首次数据更新后生成区域洞察。</p></section></aside></main>
<script src="./static/static-api.js"></script><script src="./static/app.js?v=9"></script><script src="./static/amap-map.js?v=13"></script></body></html>
